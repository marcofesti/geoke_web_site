<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up — Geoke</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="/" class="nav-logo">GEOKE<span>.ai</span></a>
  <div class="nav-links"></div>
  <div class="nav-actions"><a href="/demo/" class="btn nav-cta">Book a Demo</a></div>
</div></nav>

<section class="signup-wrap section-dark">
  <div class="container">
    <div class="signup-card">
      <span class="kicker">Get started free</span>
      <h1>Analyze Your Domain.</h1>
      <p class="lead">See exactly how your brand appears across ChatGPT, Gemini, Claude, Perplexity, Grok, and Copilot. No credit card required.</p>

      <form>
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="Marco Festi" autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Work email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="domain">Your domain</label>
          <input class="form-input" type="text" id="domain" name="domain" placeholder="yourcompany.com"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="Create a password" autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn btn-primary form-submit">Start your free trial →</button>
      </form>

      <p style="font-size:0.8rem;color:rgba(255,255,255,0.3);margin-top:1.25rem;line-height:1.65;">By signing up, you agree to our <a href="/legal/terms-of-service/" style="color:rgba(255,255,255,0.5);">Terms of Service</a> and <a href="/legal/privacy-policy/" style="color:rgba(255,255,255,0.5);">Privacy Policy</a>.</p>

      <p style="font-size:0.875rem;color:rgba(255,255,255,0.4);margin-top:2rem;">Already have an account? <a href="#" style="color:#A78BFA;">Log in →</a></p>
    </div>
  </div>
</section>

<script src="/js/main.js"></script>
</body>
</html>
